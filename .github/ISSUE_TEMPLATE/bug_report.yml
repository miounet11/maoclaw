name: Bug report
description: Report a concrete defect with reproduction steps.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug in one or two precise sentences.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include exact commands, inputs, or steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. 0.1.9"
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g. macOS 15.3 arm64"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste only the relevant excerpt.
